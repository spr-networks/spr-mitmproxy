services:
  spr-mitmproxy:
    extends:
      file: docker-compose.yml
      service: spr-mitmproxy
    image: ghcr.io/spr-networks/spr-mitmproxy:latest
    runtime: ${SPR_KRUN_RUNTIME:-spr-krun}
    sysctls: !reset []
    annotations:
      krun.cpus: "${SPR_KRUN_CPUS:-2}"
      krun.ram_mib: "${SPR_KRUN_RAM_MIB:-128}"
      krun.tap_name: "kruntap0"
      krun.net_uplink: "eth0"
      krun.vsock_path: "/state/plugins/spr-mitmproxy/socket.sock"
      krun.vsock_port: "4040"
    environment:
      SPR_KRUN_PLUGIN_SOCKET: "/run/spr-krun-plugin/spr-mitmproxy.sock"
      SPR_KRUN_VSOCK_PORT: "4040"
      MITMPROXY_INTERFACE: "eth0"
      MITMPROXY_EXPECTED_MAC: "${SPR_KRUN_MAC:-02:53:50:52:4b:0a}"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    devices:
      - "/dev/net/tun:/dev/net/tun"

networks:
  mitmnet:
    driver_opts:
      com.docker.network.bridge.name: mitmweb0
      com.docker.network.driver.mtu: "1400"
